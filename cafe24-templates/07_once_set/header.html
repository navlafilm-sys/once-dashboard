<!-- Cafe24 디자인센터 → layout/basic/header.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/once_set.css">
</head>
<body>

<header class="header">
    <div class="header-top">
        <div class="header-container">
            <!-- Logo -->
            <div class="logo">
                <a href="/">ONCE SET</a>
            </div>

            <!-- Mobile Hamburger Menu -->
            <button class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <!-- Navigation -->
            <nav class="nav" id="mainNav">
                <ul class="nav-list">
                    <li><a href="/product/list.html?cate_no=1">전체 세트</a></li>
                    <li><a href="/product/list.html?cate_no=2">커플 세트</a></li>
                    <li><a href="/product/list.html?cate_no=3">기프트</a></li>
                    <li><a href="/product/list.html?cate_no=4">커스텀</a></li>
                </ul>
            </nav>

            <!-- Right Navigation -->
            <div class="header-right">
                <!-- User State -->
                <div class="user-state">
                    <div module="Layout_statelogoff" class="logoff-state">
                        <a href="/member/login.html" class="link">로그인</a>
                        <span class="divider">|</span>
                        <a href="/member/join.html" class="link">회원가입</a>
                    </div>
                    <div module="Layout_statelogon" class="logon-state" style="display:none;">
                        <span class="user-name">{$name}님</span>
                        <span class="divider">|</span>
                        <a href="/member/logout.html" class="link">로그아웃</a>
                        <span class="divider">|</span>
                        <a href="/myshop/order_list.html" class="link">마이쇼핑</a>
                    </div>
                </div>

                <!-- Cart -->
                <a href="/order/basket.html" class="cart">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="cart-label">CART</span>
                    <span class="cart-count" module="Layout_orderBasketcount">({$count})</span>
                </a>
            </div>
        </div>
    </div>

    <!-- Category Bar -->
    <div class="category-bar">
        <div class="header-container">
            <div class="category-scroll">
                <div module="Layout_category">
                    <a href="{$link_product_list}" class="category-item">{$name_or_img_tag}</a>
                </div>
            </div>
        </div>
    </div>
</header>

<script>
// Mobile menu toggle
document.getElementById('menuToggle').addEventListener('click', function() {
    document.getElementById('mainNav').classList.toggle('active');
});
</script>

</body>
</html>
