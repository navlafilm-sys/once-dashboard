<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TONE DAILY</title>
    <link rel="stylesheet" href="/css/tone_daily.css">
</head>
<body>
<header class="header">
    <div class="header-top">
        <div class="header-wrapper">
            <!-- Logo -->
            <div class="logo">
                <a href="/">
                    <span class="logo-text">TONE DAILY</span>
                </a>
            </div>

            <!-- Navigation -->
            <nav class="gnb">
                <ul>
                    <li><a href="{$link_product_list}">전체상품</a></li>
                    <li><a href="/search?keywords=시즌컬러">시즌컬러</a></li>
                    <li><a href="/best">BEST</a></li>
                    <li><a href="/pages/about">ABOUT</a></li>
                </ul>
            </nav>

            <!-- Right Menu -->
            <div class="header-right">
                <!-- Login Module -->
                <div class="login-module">
                    <!--{if $member_status eq 'F'}-->
                    <div module="Layout_statelogoff">
                        <a href="/member/login.html">로그인</a>
                        <span class="divider">|</span>
                        <a href="/member/join.html">회원가입</a>
                    </div>
                    <!--{else}-->
                    <div module="Layout_statelogon">
                        <span class="member-name">{$name}님</span>
                        <a href="/member/logout.html">로그아웃</a>
                    </div>
                    <!--{/if}-->
                </div>

                <!-- Cart -->
                <div class="cart-module">
                    <a href="/cart/">
                        <span class="cart-icon">🛒</span>
                        <span class="cart-count" module="Layout_orderBasketcount">
                            ({$count})
                        </span>
                    </a>
                </div>
            </div>

            <!-- Mobile Menu Toggle -->
            <button class="mobile-menu-toggle" id="mobileMenuToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </div>

    <!-- Category Bar -->
    <div class="category-bar">
        <div class="category-wrapper">
            <div module="Layout_category">
                <ul class="category-list">
                    <!--{foreach $item from $smartdesign_category}-->
                    <li>
                        <a href="{$item.link_product_list}">
                            <!--{if $item.name_or_img_tag|preg_match:'/<img/'}-->
                            {$item.name_or_img_tag}
                            <!--{else}-->
                            <span>{$item.name_or_img_tag}</span>
                            <!--{/if}-->
                        </a>
                    </li>
                    <!--{/foreach}-->
                </ul>
            </div>
        </div>
    </div>

    <!-- Mobile Menu -->
    <nav class="mobile-menu" id="mobileMenu">
        <ul>
            <li><a href="{$link_product_list}">전체상품</a></li>
            <li><a href="/search?keywords=시즌컬러">시즌컬러</a></li>
            <li><a href="/best">BEST</a></li>
            <li><a href="/pages/about">ABOUT</a></li>
        </ul>
    </nav>
</header>

<script>
// Mobile menu toggle
const menuToggle = document.getElementById('mobileMenuToggle');
const mobileMenu = document.getElementById('mobileMenu');

if (menuToggle && mobileMenu) {
    menuToggle.addEventListener('click', function() {
        mobileMenu.classList.toggle('active');
    });
}
</script>
</body>
</html>
