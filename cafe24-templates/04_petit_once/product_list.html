<!-- Cafe24 Design Center: product/list.html -->
<!-- PETIT ONCE Product List Page -->

<!--@css(/css/petit_once.css)-->

<main class="petit-main petit-product-list-page">
  <div class="petit-container">
    <!-- Page Header -->
    <div class="petit-page-header">
      <h1 class="petit-page-title">상품목록</h1>
    </div>

    <div class="petit-product-list-wrapper">
      <!-- Sidebar: Category & Filters -->
      <aside class="petit-sidebar petit-product-sidebar">
        <!--@module(product_headcategory)-->
        <div module="product_headcategory" class="petit-category-section">
          <h3 class="petit-sidebar-title">카테고리</h3>
          <!-- Category content -->
        </div>
        <!--/module(product_headcategory)-->

        <!-- Filters Section -->
        <div class="petit-filter-section">
          <h3 class="petit-sidebar-title">가격대</h3>
          <ul class="petit-filter-list">
            <li><a href="#" class="petit-filter-link">9,900원</a></li>
            <li><a href="#" class="petit-filter-link">10,000 ~ 20,000원</a></li>
            <li><a href="#" class="petit-filter-link">20,000 ~ 50,000원</a></li>
            <li><a href="#" class="petit-filter-link">50,000원 이상</a></li>
          </ul>
        </div>

        <div class="petit-filter-section">
          <h3 class="petit-sidebar-title">상품상태</h3>
          <ul class="petit-filter-list">
            <li><a href="#" class="petit-filter-link">신상품</a></li>
            <li><a href="#" class="petit-filter-link">특가상품</a></li>
            <li><a href="#" class="petit-filter-link">인기상품</a></li>
          </ul>
        </div>
      </aside>

      <!-- Main Content: Products -->
      <div class="petit-product-list-main">
        <!-- Sort Options -->
        <!--@module(product_normalmenu)-->
        <div module="product_normalmenu" class="petit-product-menu">
          <div class="petit-product-sort">
            <button class="petit-sort-btn petit-sort-active">추천순</button>
            <button class="petit-sort-btn">신상품</button>
            <button class="petit-sort-btn">인기순</button>
            <button class="petit-sort-btn">낮은가격순</button>
            <button class="petit-sort-btn">높은가격순</button>
          </div>
          <div class="petit-product-view-toggle">
            <button class="petit-view-btn petit-view-grid-active" title="그리드보기">
              ⊞⊞
            </button>
            <button class="petit-view-btn" title="리스트보기">
              ≡
            </button>
          </div>
        </div>
        <!--/module(product_normalmenu)-->

        <!-- Product Grid (4 columns on desktop, 2 on mobile) -->
        <!--@module(product_listnormal)-->
        <div module="product_listnormal" class="petit-product-grid petit-product-grid-4col">
          <!--$count:20-->
          <div class="petit-product-item">
            <div class="petit-product-image">
              <a href="{$product_url}" class="petit-product-link">
                <img src="{$image_url}" alt="{$product_name}" class="petit-product-img" loading="lazy" />
              </a>
              {$product_label}
            </div>
            <div class="petit-product-info">
              <h3 class="petit-product-name">
                <a href="{$product_url}" class="petit-product-name-link">{$product_name}</a>
              </h3>
              <div class="petit-product-price-wrapper">
                <span class="petit-product-price">{$product_price_text}</span>
                {$product_discount_percent}
              </div>
              <div class="petit-product-rating">
                {$product_review_rating}
                <span class="petit-review-count">({$product_review_count})</span>
              </div>
              <div class="petit-product-actions">
                <button class="petit-wishlist-btn" data-product-id="{$product_no}" title="찜하기">
                  ♡
                </button>
                <button class="petit-cart-btn" data-product-id="{$product_no}" title="장바구니">
                  🛒
                </button>
              </div>
            </div>
          </div>
          <!--/$count-->
        </div>
        <!--/module(product_listnormal)-->

        <!-- Pagination -->
        <!--@module(product_normalpaging)-->
        <div module="product_normalpaging" class="petit-pagination">
          <!-- Pagination content -->
        </div>
        <!--/module(product_normalpaging)-->
      </div>
    </div>
  </div>
</main>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Sort Button Handler
  const sortBtns = document.querySelectorAll('.petit-sort-btn');
  sortBtns.forEach(btn => {
    btn.addEventListener('click', function() {
      sortBtns.forEach(b => b.classList.remove('petit-sort-active'));
      this.classList.add('petit-sort-active');
    });
  });

  // View Toggle Handler
  const viewBtns = document.querySelectorAll('.petit-view-btn');
  const productGrid = document.querySelector('.petit-product-grid');

  viewBtns.forEach((btn, index) => {
    btn.addEventListener('click', function() {
      viewBtns.forEach(b => b.classList.remove('petit-view-grid-active', 'petit-view-list-active'));

      if (index === 0) {
        this.classList.add('petit-view-grid-active');
        productGrid.classList.remove('petit-grid-list-view');
      } else {
        this.classList.add('petit-view-list-active');
        productGrid.classList.add('petit-grid-list-view');
      }
    });
  });

  // Wishlist Button Handler
  const wishlistBtns = document.querySelectorAll('.petit-wishlist-btn');
  wishlistBtns.forEach(btn => {
    btn.addEventListener('click', function() {
      this.classList.toggle('petit-wishlist-active');
      const productId = this.getAttribute('data-product-id');
      console.log('Wishlist toggled:', productId);
    });
  });

  // Add to Cart Handler
  const cartBtns = document.querySelectorAll('.petit-cart-btn');
  cartBtns.forEach(btn => {
    btn.addEventListener('click', function() {
      const productId = this.getAttribute('data-product-id');
      console.log('Add to cart:', productId);
      // 장바구니 추가 로직
    });
  });
});
</script>
