<!-- Cafe24 Design Center: layout/basic/header.html -->
<!-- PETIT ONCE Header - Playful, Fun, Kitsch -->

<header class="petit-header">
  <!-- Top Bar: Login/Logout & Basket -->
  <div class="petit-header-top">
    <div class="petit-container">
      <div class="petit-header-actions">
        <div class="petit-user-menu">
          <!--@layout_statelogoff-->
          <div class="petit-login-prompt">
            <a href="/member/login.html" class="petit-link-login">로그인</a>
            <span class="petit-divider">|</span>
            <a href="/member/join.html" class="petit-link-join">회원가입</a>
          </div>
          <!--/layout_statelogoff-->

          <!--@layout_statelogon-->
          <div class="petit-login-welcome">
            <span class="petit-welcome-text">{$name}님 환영합니다!</span>
            <a href="/member/logout.html" class="petit-link-logout">로그아웃</a>
          </div>
          <!--/layout_statelogon-->
        </div>

        <div class="petit-basket-menu">
          <!--@layout_orderBasketcount-->
          <a href="/order/basket.html" class="petit-basket-link">
            <span class="petit-basket-icon">🛒</span>
            <span class="petit-basket-label">장바구니</span>
            <span class="petit-basket-count">{$count}</span>
          </a>
          <!--/layout_orderBasketcount-->
        </div>
      </div>
    </div>
  </div>

  <!-- Main Header: Logo & Navigation -->
  <div class="petit-header-main">
    <div class="petit-container">
      <div class="petit-header-wrapper">
        <!-- Logo -->
        <div class="petit-logo">
          <a href="/" class="petit-logo-link">
            <span class="petit-logo-text">PETIT ONCE</span>
            <span class="petit-logo-subtitle">작은 귀여움, 큰 만족</span>
          </a>
        </div>

        <!-- Desktop Navigation -->
        <nav class="petit-nav-desktop">
          <ul class="petit-nav-list">
            <li class="petit-nav-item">
              <!--@layout_category-->
              <a href="{$link_product_list}" class="petit-nav-link">
                {$name_or_img_tag}
              </a>
              <!--/layout_category-->
            </li>
            <li class="petit-nav-item">
              <a href="/product/list.html?categories=special" class="petit-nav-link petit-special-badge">
                🌟 9,900원 특가
              </a>
            </li>
            <li class="petit-nav-item">
              <a href="/product/list.html?categories=new" class="petit-nav-link petit-new-badge">
                ✨ NEW
              </a>
            </li>
            <li class="petit-nav-item">
              <a href="/product/list.html?categories=sticker" class="petit-nav-link">
                스티커
              </a>
            </li>
          </ul>
        </nav>

        <!-- Mobile Hamburger Menu -->
        <button class="petit-hamburger-menu" id="petit-menu-toggle" aria-label="메뉴 열기">
          <span class="petit-hamburger-line"></span>
          <span class="petit-hamburger-line"></span>
          <span class="petit-hamburger-line"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Navigation Menu (Hidden by default) -->
  <nav class="petit-nav-mobile" id="petit-mobile-menu">
    <ul class="petit-nav-mobile-list">
      <li class="petit-nav-mobile-item">
        <!--@layout_category-->
        <a href="{$link_product_list}" class="petit-nav-mobile-link">
          {$name_or_img_tag}
        </a>
        <!--/layout_category-->
      </li>
      <li class="petit-nav-mobile-item">
        <a href="/product/list.html?categories=special" class="petit-nav-mobile-link petit-special-badge">
          🌟 9,900원 특가
        </a>
      </li>
      <li class="petit-nav-mobile-item">
        <a href="/product/list.html?categories=new" class="petit-nav-mobile-link petit-new-badge">
          ✨ NEW
        </a>
      </li>
      <li class="petit-nav-mobile-item">
        <a href="/product/list.html?categories=sticker" class="petit-nav-mobile-link">
          스티커
        </a>
      </li>
    </ul>
  </nav>
</header>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const hamburgerBtn = document.getElementById('petit-menu-toggle');
  const mobileMenu = document.getElementById('petit-mobile-menu');

  if (hamburgerBtn && mobileMenu) {
    hamburgerBtn.addEventListener('click', function() {
      mobileMenu.classList.toggle('petit-mobile-open');
      hamburgerBtn.classList.toggle('petit-hamburger-active');
    });

    // Close menu when a link is clicked
    const mobileLinks = mobileMenu.querySelectorAll('.petit-nav-mobile-link');
    mobileLinks.forEach(link => {
      link.addEventListener('click', function() {
        mobileMenu.classList.remove('petit-mobile-open');
        hamburgerBtn.classList.remove('petit-hamburger-active');
      });
    });
  }
});
</script>
