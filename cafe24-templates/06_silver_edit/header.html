/* Cafe24 디자인센터 → layout/basic/header.html */

<header class="header">
  <div class="header-top">
    <div class="container">
      <!-- Login Module -->
      <div class="header-user">
        <div module="Layout_statelogoff">
          <a href="/member/login.html">로그인</a> | <a href="/member/join.html">회원가입</a>
        </div>
        <div module="Layout_statelogon">
          <span>{$name}님</span> | <a href="/member/logout.html">로그아웃</a> | <a href="/myshop/order_list.html">마이쇼핑</a>
        </div>
      </div>
    </div>
  </div>

  <div class="header-main">
    <div class="container">
      <!-- Logo -->
      <div class="logo">
        <a href="/">
          <span class="logo-text">SILVER EDIT</span>
        </a>
      </div>

      <!-- Navigation -->
      <nav class="nav">
        <ul class="nav-list">
          <li><a href="/product/list.html">전체상품</a></li>
          <li><a href="/product/list.html?category=mirror">MIRROR</a></li>
          <li><a href="/product/list.html?category=chrome">CHROME</a></li>
          <li><a href="/product/list.html?category=new">NEW</a></li>
        </ul>
      </nav>

      <!-- Cart -->
      <div class="header-cart">
        <a href="/order/basket.html" class="cart-link">
          CART <span module="Layout_orderBasketcount">({$count})</span>
        </a>
      </div>

      <!-- Mobile Menu Toggle -->
      <button class="hamburger" id="mobileMenuToggle" aria-label="메뉴 토글">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobileMenu">
    <nav class="mobile-nav">
      <ul class="mobile-nav-list">
        <li><a href="/product/list.html">전체상품</a></li>
        <li><a href="/product/list.html?category=mirror">MIRROR</a></li>
        <li><a href="/product/list.html?category=chrome">CHROME</a></li>
        <li><a href="/product/list.html?category=new">NEW</a></li>
      </ul>
      <div class="mobile-user-menu">
        <div module="Layout_statelogoff">
          <a href="/member/login.html">로그인</a> | <a href="/member/join.html">회원가입</a>
        </div>
        <div module="Layout_statelogon">
          <span>{$name}님</span> | <a href="/member/logout.html">로그아웃</a> | <a href="/myshop/order_list.html">마이쇼핑</a>
        </div>
      </div>
    </nav>
  </div>

  <!-- Category Module -->
  <div module="Layout_category" class="category-menu">
    <a href="{$link_product_list}" class="category-link">{$name_or_img_tag}</a>
  </div>
</header>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const hamburger = document.getElementById('mobileMenuToggle');
    const mobileMenu = document.getElementById('mobileMenu');

    hamburger.addEventListener('click', function() {
      mobileMenu.classList.toggle('active');
      hamburger.classList.toggle('active');
    });
  });
</script>
